spring.application.name=taskflow

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taskflow}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Security Configuration
jwt.secret=${JWT_SECRET:this_is_a_very_long_and_secure_jwt_secret_key_12345}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging Configuration
logging.level.org.springframework.security=INFO
logging.level.com.palash.taskflow=DEBUG
